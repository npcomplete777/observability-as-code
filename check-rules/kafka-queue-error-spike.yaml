apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: kafka-queue-error-spike
  namespace: otel-demo
  labels:
    app.kubernetes.io/managed-by: dash0-operator
    dash0.com/origin: api-ccc6b9b7-5ca9-4e72-ad33-daf36c8fb015
spec:
  groups:
    - name: kafka-queue-alerts
      interval: 1m
      rules:
        - alert: KafkaQueueErrorSpike
          expr: >-
            sum by (service_name) (
              rate({otel_metric_name="dash0.spans", otel_span_status_code="ERROR",
                service_name=~"kafka|order|checkout|payment|accounting|fraud-detection|notification"}[5m])
            )
            /
            clamp_min(
              sum by (service_name) (
                rate({otel_metric_name="dash0.spans",
                  service_name=~"kafka|order|checkout|payment|accounting|fraud-detection|notification"}[5m])
              ), 1e-10
            ) > 0.05
          for: 2m
          labels:
            severity: critical
            feature_flag: kafkaQueueProblems
            source: autonomous
            team: platform
          annotations:
            summary: "Kafka-related service {{ $labels.service_name }} error rate exceeds 5%"
            description: >-
              With kafkaQueueProblems flag active, service {{ $labels.service_name }}
              error rate is {{ $value | humanizePercentage }}. Likely caused by
              Kafka consumer timeouts or queue saturation.
