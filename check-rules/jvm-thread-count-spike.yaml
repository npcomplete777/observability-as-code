apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: jvm-thread-count-spike
  namespace: otel-demo
  labels:
    app.kubernetes.io/managed-by: dash0-operator
spec:
  groups:
    - name: jvm-alerts
      interval: 2m
      rules:
        - alert: JvmThreadCountSpike
          expr: >-
            {otel_metric_name="jvm.thread.count"} > 500
          for: 5m
          labels:
            severity: warning
            domain: jvm
            component: threads
            source: kibana-migration
          annotations:
            summary: "JVM thread count exceeds 500"
            description: >-
              Migrated from Kibana rule: [JVM] Thread Count Spike (>500 threads)
              (type: .es-query, ID: 55754f36-f586-461c-9cae-21a81f004f4f).
              Original rule checked otel-metrics* for
              jvm.thread.count >= 500 with > 3 hits in 5m window,
              evaluated every 2m. Tags: jvm, threads, production, warning.
