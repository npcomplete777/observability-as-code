apiVersion: perses.dev/v1alpha1
kind: PersesDashboard
metadata:
  name: kafka-orders-consumer-full-pipeline
  namespace: otel-demo
  labels:
    app.kubernetes.io/managed-by: dash0-operator
    dash0.com/origin: api-96cddce2-4840-4032-bff7-f9369ae25f66
spec:
  display:
    name: Kafka Orders & Consumer (Full Pipeline)
  duration: 1h
  layouts:
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: Log & Span Overview
      items:
      - content:
          $ref: '#/spec/panels/order-kafka-log-volume-by-service'
        height: 8
        width: 12
        x: 0
        y: 0
      - content:
          $ref: '#/spec/panels/consumer-records-consumed-rate'
        height: 8
        width: 12
        x: 12
        y: 0
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: Consumer Metrics
      items:
      - content:
          $ref: '#/spec/panels/consumer-lag-max'
        height: 8
        width: 12
        x: 0
        y: 0
      - content:
          $ref: '#/spec/panels/consumer-fetch-latency'
        height: 8
        width: 12
        x: 12
        y: 0
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: Broker Metrics
      items:
      - content:
          $ref: '#/spec/panels/broker-partitions-message-count'
        height: 8
        width: 12
        x: 0
        y: 0
      - content:
          $ref: '#/spec/panels/broker-request-latency-p50-p99'
        height: 8
        width: 12
        x: 12
        y: 0
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: Consumer Throughput
      items:
      - content:
          $ref: '#/spec/panels/consumer-bytes-consumed-rate-by-service'
        height: 8
        width: 24
        x: 0
        y: 0
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: Pipeline Health
      items:
      - content:
          $ref: '#/spec/panels/order-pipeline-error-rate'
        height: 8
        width: 12
        x: 0
        y: 0
      - content:
          $ref: '#/spec/panels/kafka-feature-flag-activity'
        height: 8
        width: 12
        x: 12
        y: 0
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: Log Messages
      items:
      - content:
          $ref: '#/spec/panels/recent-kafka-order-log-messages'
        height: 10
        width: 24
        x: 0
        y: 0
  panels:
    order-kafka-log-volume-by-service:
      kind: Panel
      spec:
        display:
          name: Order & Kafka Log Volume by Service
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            visual:
              areaOpacity: 0.5
              display: line
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: sum by (service_name) (rate({otel_metric_name="dash0.logs", service_name=~"kafka|fraud-detection|order|checkout"}[$__rate_interval]))
                seriesNameFormat: '{{service_name}}'
    consumer-records-consumed-rate:
      kind: Panel
      spec:
        display:
          name: Consumer Records Consumed Rate
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: Records/sec
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  avg by (service_name) ({otel_metric_name="kafka.consumer.records_consumed_rate", otel_metric_type="gauge"})
                seriesNameFormat: '{{service_name}}'
    consumer-lag-max:
      kind: Panel
      spec:
        display:
          name: Consumer Lag (Max)
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            visual:
              areaOpacity: 0.3
              display: line
            yAxis:
              label: Records
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  max by (service_name) ({otel_metric_name="kafka.consumer.records_lag_max", otel_metric_type="gauge"})
                seriesNameFormat: '{{service_name}}'
    consumer-fetch-latency:
      kind: Panel
      spec:
        display:
          name: Consumer Fetch Latency
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: Latency (ms)
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  avg({otel_metric_name="kafka.consumer.fetch_latency_avg", otel_metric_type="gauge"})
                seriesNameFormat: Fetch Latency Avg
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  max({otel_metric_name="kafka.consumer.fetch_latency_max", otel_metric_type="gauge"})
                seriesNameFormat: Fetch Latency Max
    broker-partitions-message-count:
      kind: Panel
      spec:
        display:
          name: 'Broker: Partitions & Message Count'
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  last_over_time({otel_metric_name="kafka.partition.count", otel_metric_type="sum"}[5m])
                seriesNameFormat: Partition Count
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  max(increase({otel_metric_name="kafka.message.count", otel_metric_type="sum"}[5m]))
                seriesNameFormat: Messages In
    broker-request-latency-p50-p99:
      kind: Panel
      spec:
        display:
          name: 'Broker: Request Latency (p50 / p99)'
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: ms
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  avg({otel_metric_name="kafka.request.time.50p", otel_metric_type="gauge"})
                seriesNameFormat: Request Time p50
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  avg({otel_metric_name="kafka.request.time.99p", otel_metric_type="gauge"})
                seriesNameFormat: Request Time p99
    consumer-bytes-consumed-rate-by-service:
      kind: Panel
      spec:
        display:
          name: 'Consumer: Bytes Consumed Rate by Service'
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            visual:
              areaOpacity: 0.5
              display: line
            yAxis:
              label: bytes/sec
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  avg by (service_name) ({otel_metric_name="kafka.consumer.bytes_consumed_rate", otel_metric_type="gauge"})
                seriesNameFormat: '{{service_name}}'
    order-pipeline-error-rate:
      kind: Panel
      spec:
        display:
          name: Order Pipeline Error Rate
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            visual:
              areaOpacity: 0.5
              display: line
            yAxis:
              label: Error Count
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: sum by (service_name) (rate({otel_metric_name="dash0.spans", otel_span_status_code="ERROR", service_name=~"order|checkout|fraud-detection"}[$__rate_interval]))
                seriesNameFormat: '{{service_name}}'
    kafka-feature-flag-activity:
      kind: Panel
      spec:
        display:
          name: Kafka Feature Flag Activity
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: sum(rate({otel_metric_name="dash0.spans", feature_flag_key="kafkaQueueProblems"}[$__rate_interval]))
                seriesNameFormat: Flag Events
    recent-kafka-order-log-messages:
      kind: Panel
      spec:
        display:
          name: Recent Kafka & Order Log Messages
        plugin:
          kind: TimeSeriesTable
          spec:
            format:
              decimalPlaces: 0
              shortValues: true
              unit: decimal
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: sum by (service_name, otel_log_severity_range) (rate({otel_metric_name="dash0.logs", service_name=~"kafka|fraud-detection|order|checkout"}[$__rate_interval]))
                seriesNameFormat: '{{service_name}} - {{otel_log_severity_range}}'
  variables: []
