apiVersion: perses.dev/v1alpha1
kind: PersesDashboard
metadata:
  name: kafka-orders-consumer
  namespace: otel-demo
  labels:
    app.kubernetes.io/managed-by: dash0-operator
    dash0.com/origin: api-a0a9f525-e305-44c3-a771-c80002d5c4db
spec:
  display:
    name: Kafka Orders & Consumer
  duration: 1h
  layouts:
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: Order Logs
      items:
      - content:
          $ref: '#/spec/panels/order-log-volume-by-service'
        height: 8
        width: 24
        x: 0
        y: 0
      - content:
          $ref: '#/spec/panels/consumer-records-consumed-rate'
        height: 8
        width: 12
        x: 0
        y: 8
      - content:
          $ref: '#/spec/panels/consumer-lag-max'
        height: 8
        width: 12
        x: 12
        y: 8
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: Consumer Metrics
      items:
      - content:
          $ref: '#/spec/panels/consumer-fetch-latency'
        height: 8
        width: 12
        x: 0
        y: 0
      - content:
          $ref: '#/spec/panels/recent-kafka-order-log-messages'
        height: 8
        width: 12
        x: 12
        y: 0
  panels:
    order-log-volume-by-service:
      kind: Panel
      spec:
        display:
          name: Order Log Volume by Service
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            visual:
              areaOpacity: 0.5
              display: line
            yAxis:
              label: Logs/sec
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: sum by (service_name) (rate({otel_metric_name="dash0.logs", service_name=~"kafka|fraud-detection|order.*"}[$__rate_interval]))
                seriesNameFormat: '{{service_name}}'
    consumer-records-consumed-rate:
      kind: Panel
      spec:
        display:
          name: Consumer Records Consumed Rate
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: Records/sec
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: avg by (service_name) (kafka_consumer_records_consumed_rate)
                seriesNameFormat: '{{service_name}}'
    consumer-lag-max:
      kind: Panel
      spec:
        display:
          name: Consumer Lag (Max)
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            visual:
              areaOpacity: 0.3
              display: line
            yAxis:
              label: Records
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: max by (service_name) (kafka_consumer_records_lag_max)
                seriesNameFormat: '{{service_name}}'
    consumer-fetch-latency:
      kind: Panel
      spec:
        display:
          name: Consumer Fetch Latency
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: Latency (ms)
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: avg by (service_name) (kafka_consumer_fetch_latency_avg)
                seriesNameFormat: Avg - {{service_name}}
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: max by (service_name) (kafka_consumer_fetch_latency_max)
                seriesNameFormat: Max - {{service_name}}
    recent-kafka-order-log-messages:
      kind: Panel
      spec:
        display:
          name: Recent Kafka & Order Log Messages
        plugin:
          kind: TimeSeriesTable
          spec:
            format:
              decimalPlaces: 0
              shortValues: true
              unit: decimal
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: sum by (service_name, otel_log_severity_range) (rate({otel_metric_name="dash0.logs", service_name=~"kafka|fraud-detection|order.*"}[$__rate_interval]))
                seriesNameFormat: '{{service_name}} [{{otel_log_severity_range}}]'
  variables: []
