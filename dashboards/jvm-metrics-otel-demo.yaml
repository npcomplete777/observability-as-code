apiVersion: perses.dev/v1alpha1
kind: PersesDashboard
metadata:
  name: jvm-metrics-otel-demo
  namespace: otel-demo
  labels:
    app.kubernetes.io/managed-by: dash0-operator
    dash0.com/origin: api-9f1b65f8-bacc-4340-bbd9-ed628a3fa460
spec:
  display:
    name: JVM Metrics - OTel Demo
  duration: 1h
  layouts:
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: Memory & CPU
      items:
      - content:
          $ref: '#/spec/panels/jvm-heap-memory-used'
        height: 8
        width: 12
        x: 0
        y: 0
      - content:
          $ref: '#/spec/panels/jvm-cpu-utilization'
        height: 8
        width: 12
        x: 12
        y: 0
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: Memory Details & Threads
      items:
      - content:
          $ref: '#/spec/panels/jvm-memory-committed-vs-limit'
        height: 8
        width: 12
        x: 0
        y: 0
      - content:
          $ref: '#/spec/panels/jvm-thread-count'
        height: 8
        width: 12
        x: 12
        y: 0
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: GC & Process
      items:
      - content:
          $ref: '#/spec/panels/jvm-memory-after-gc'
        height: 8
        width: 12
        x: 0
        y: 0
      - content:
          $ref: '#/spec/panels/process-cpu-utilization'
        height: 8
        width: 12
        x: 12
        y: 0
  panels:
    jvm-heap-memory-used:
      kind: Panel
      spec:
        display:
          name: JVM Heap Memory Used
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: Bytes
            visual:
              areaOpacity: 0.55
              display: line
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  avg by (service_name) ({otel_metric_name="jvm.memory.used", otel_metric_type="gauge"})
                seriesNameFormat: '{{service_name}}'
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
    jvm-cpu-utilization:
      kind: Panel
      spec:
        display:
          name: JVM CPU Utilization
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: Utilization (0-1)
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  avg by (service_name) ({otel_metric_name="jvm.cpu.recent_utilization", otel_metric_type="gauge"})
                seriesNameFormat: '{{service_name}}'
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
    jvm-memory-committed-vs-limit:
      kind: Panel
      spec:
        display:
          name: 'JVM Memory: Committed vs Limit'
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: Bytes
            visual:
              areaOpacity: 0.3
              display: line
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  avg by (service_name) ({otel_metric_name="jvm.memory.committed", otel_metric_type="gauge"})
                seriesNameFormat: 'committed: {{service_name}}'
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  avg by (service_name) ({otel_metric_name="jvm.memory.limit", otel_metric_type="gauge"})
                seriesNameFormat: 'limit: {{service_name}}'
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
    jvm-thread-count:
      kind: Panel
      spec:
        display:
          name: JVM Thread Count
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: Threads
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  avg by (service_name) ({otel_metric_name="jvm.thread.count", otel_metric_type="gauge"})
                seriesNameFormat: '{{service_name}}'
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
    jvm-memory-after-gc:
      kind: Panel
      spec:
        display:
          name: JVM Memory After GC
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: Bytes
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  avg by (service_name) ({otel_metric_name="jvm.memory.used_after_last_gc", otel_metric_type="gauge"})
                seriesNameFormat: '{{service_name}}'
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
    process-cpu-utilization:
      kind: Panel
      spec:
        display:
          name: Process CPU Utilization
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: Utilization
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  avg by (service_name) ({otel_metric_name="process.cpu.utilization", otel_metric_type="gauge"})
                seriesNameFormat: '{{service_name}}'
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
  variables: []