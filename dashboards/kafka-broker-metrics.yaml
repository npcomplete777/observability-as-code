apiVersion: perses.dev/v1alpha1
kind: PersesDashboard
metadata:
  name: kafka-broker-metrics
  namespace: otel-demo
  labels:
    app.kubernetes.io/managed-by: dash0-operator
    dash0.com/origin: api-8fff056a-6080-41ea-94b6-e3285b315ee5
spec:
  display:
    name: Kafka Broker Metrics
  duration: 1h
  layouts:
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: Broker Traffic
      items:
      - content:
          $ref: '#/spec/panels/message-count-over-time'
        height: 8
        width: 12
        x: 0
        y: 0
      - content:
          $ref: '#/spec/panels/request-rate-by-type'
        height: 8
        width: 12
        x: 12
        y: 0
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: Latency & Health
      items:
      - content:
          $ref: '#/spec/panels/request-latency-p50-p99'
        height: 8
        width: 12
        x: 0
        y: 0
      - content:
          $ref: '#/spec/panels/partition-controller-health'
        height: 8
        width: 12
        x: 12
        y: 0
  - kind: Grid
    spec:
      display:
        collapse:
          open: true
        title: Network & Failures
      items:
      - content:
          $ref: '#/spec/panels/network-io-failed-requests'
        height: 8
        width: 24
        x: 0
        y: 0
  panels:
    message-count-over-time:
      kind: Panel
      spec:
        display:
          name: Message Count Over Time
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: Messages
            visual:
              areaOpacity: 0.55
              display: line
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  max(increase({otel_metric_name="kafka.message.count", otel_metric_type="sum"}[5m]))
                seriesNameFormat: Messages In
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
    request-rate-by-type:
      kind: Panel
      spec:
        display:
          name: Request Rate by Type
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: Requests
            visual:
              display: bar
              stacking: normal
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  sum by (type) (increase({otel_metric_name="kafka.request.count", otel_metric_type="sum"}[5m]))
                seriesNameFormat: '{{type}}'
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
    request-latency-p50-p99:
      kind: Panel
      spec:
        display:
          name: Request Latency (P50 / P99)
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: Latency (ms)
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  avg({otel_metric_name="kafka.request.time.50p", otel_metric_type="gauge"})
                seriesNameFormat: Request Time p50
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  avg({otel_metric_name="kafka.request.time.99p", otel_metric_type="gauge"})
                seriesNameFormat: Request Time p99
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
    partition-controller-health:
      kind: Panel
      spec:
        display:
          name: Partition & Controller Health
        plugin:
          kind: TimeSeriesTable
          spec:
            format:
              decimalPlaces: 0
              shortValues: true
              unit: decimal
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  last_over_time({otel_metric_name="kafka.partition.count", otel_metric_type="sum"}[5m])
                seriesNameFormat: Total Partitions
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  last_over_time({otel_metric_name="kafka.partition.offline", otel_metric_type="sum"}[5m])
                seriesNameFormat: Offline
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  last_over_time({otel_metric_name="kafka.partition.underReplicated", otel_metric_type="sum"}[5m])
                seriesNameFormat: Under-Replicated
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  last_over_time({otel_metric_name="kafka.purgatory.size", otel_metric_type="sum"}[5m])
                seriesNameFormat: Purgatory Size
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  last_over_time({otel_metric_name="kafka.controller.active.count", otel_metric_type="sum"}[5m])
                seriesNameFormat: Active Controllers
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
    network-io-failed-requests:
      kind: Panel
      spec:
        display:
          name: Network I/O & Failed Requests
        plugin:
          kind: TimeSeriesChart
          spec:
            legend:
              position: right
            yAxis:
              label: Count
        queries:
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  rate({otel_metric_name="kafka.network.io", otel_metric_type="sum"}[$__rate_interval])
                seriesNameFormat: Network I/O
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
        - kind: TimeSeriesQuery
          spec:
            plugin:
              kind: PrometheusTimeSeriesQuery
              spec:
                query: >-
                  rate({otel_metric_name="kafka.request.failed", otel_metric_type="sum"}[$__rate_interval])
                seriesNameFormat: Failed Requests
                datasource:
                  kind: PrometheusDatasource
                  spec:
                    dataset: astronomy-demo
  variables: []